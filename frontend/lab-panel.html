<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jana AI | Laboratory Fulfillment</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #512da8;
            --secondary: #7e57c2;
            --background: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --accent: #00e5ff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%);
            margin: 0;
            display: flex;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background: var(--card-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 32px 24px;
            border-bottom: 1px solid #333;
        }

        .sidebar-header h1 {
            font-size: 24px;
            margin: 0;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .case-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .case-item {
            padding: 20px;
            background: #252525;
            border-radius: 12px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .case-item:hover {
            background: #2d2d2d;
            border-color: var(--secondary);
            transform: translateX(5px);
        }

        .case-item.active {
            background: var(--primary);
            box-shadow: 0 4px 15px rgba(81, 45, 168, 0.4);
        }

        .case-item h3 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }

        .case-item p {
            margin: 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Main Workspace */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0a0a0a;
        }

        .workspace-header {
            padding: 24px 40px;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }

        .fulfillment-card {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .test-list {
            margin: 32px 0;
        }

        .test-row {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #252525;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .test-info {
            flex: 1;
        }

        .result-input {
            flex: 2;
            background: #121212;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
        }

        .btn-submit {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px 36px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: #00b8d4;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 229, 255, 0.3);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 100px;
        }

        .badge {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Lab Queue</h1>
        </div>
        <div id="caseList" class="case-list">
            <div class="empty-state">Looking for orders...</div>
        </div>
    </div>

    <div class="workspace">
        <div class="workspace-header">
            <h2 id="viewTitle">Select an Order</h2>
            <div id="statusBadge" class="badge" style="display:none">Pending Fulfillment</div>
        </div>

        <div id="mainContent" class="content">
            <div class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.2; margin-bottom:20px;">
                    <path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z"/>
                    <path d="M9 3V21M15 3V21M3 9H21M3 15H21"/>
                </svg>
                <p>Choose a patient from the left to start uploading diagnostic results.</p>
            </div>
            
            <div id="fulfillmentForm" class="fulfillment-card" style="display:none;">
                <div style="margin-bottom: 30px;">
                    <h3 id="patientMeta" style="margin:0; color:var(--text-muted); font-size:14px; text-transform:uppercase;">Case #---</h3>
                    <h2 id="patientName" style="margin:5px 0 0 0; font-size:28px;">Patient Name</h2>
                </div>

                <div id="testArea" class="test-list">
                    <!-- Tests will be loaded here -->
                </div>

                <div style="margin-top:40px; border-top:1px solid #333; padding-top:20px;">
                    <h3>Laboratory Notes</h3>
                    <textarea id="labNotes" placeholder="General observations or technician comments..." style="width:100%; background:#121212; border:1px solid #444; border-radius:12px; padding:16px; color:white; min-height:100px; font-family:inherit;"></textarea>
                </div>

                <button class="btn-submit" onclick="submitResults()">Fulfill & Update System</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/lab';
        let currentCaseId = null;
        let activeOrders = [];

        async function fetchQueue() {
            try {
                const res = await fetch(`${API_BASE}/active-orders`);
                const cases = await res.json();
                const list = document.getElementById('caseList');
                
                if (cases.length === 0) {
                    list.innerHTML = '<div class="empty-state">No pending laboratory orders.</div>';
                    return;
                }

                list.innerHTML = cases.map(c => `
                    <div class="case-item ${currentCaseId === c.caseId ? 'active' : ''}" onclick="selectCase('${c.caseId}')">
                        <h3>Patient Case</h3>
                        <p>${c.tests.length} tests pending</p>
                        <p style="font-size:11px; margin-top:8px;">${c.tests.map(t => t.name).join(', ')}</p>
                    </div>
                `).join('');
            } catch (e) { console.error('Queue load failed', e); }
        }

        async function selectCase(caseId) {
            currentCaseId = caseId;
            document.querySelector('.empty-state').style.display = 'none';
            document.getElementById('fulfillmentForm').style.display = 'block';
            document.getElementById('statusBadge').style.display = 'block';
            
            try {
                const res = await fetch(`${API_BASE}/case-orders/${caseId}`);
                const data = await res.json();
                activeOrders = data.tests;

                document.getElementById('patientMeta').innerText = `Case #${caseId.slice(-8)}`;
                document.getElementById('patientName').innerText = data.memberName || 'Scheduled Patient';
                
                const testArea = document.getElementById('testArea');
                testArea.innerHTML = data.tests.map((t, idx) => `
                    <div class="test-row">
                        <div class="test-info">
                            <strong style="display:block;">${t.name}</strong>
                            <span style="font-size:12px; color:var(--text-muted);">Status: ${t.status}</span>
                        </div>
                        <input type="text" class="result-input" data-id="${t.id}" placeholder="Enter test result summary...">
                    </div>
                `).join('');
                
                fetchQueue(); // Refresh to show active
            } catch (e) { console.error('Load failed', e); }
        }

        async function submitResults() {
            const results = Array.from(document.querySelectorAll('.result-input')).map(input => ({
                id: input.dataset.id,
                result: input.value
            }));

            if (results.some(r => !r.result)) {
                alert('Please enter results for all tests.');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/submit-results`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        caseId: currentCaseId,
                        technicianId: 'LAB-TECH-01',
                        results: results,
                        notes: document.getElementById('labNotes').value
                    })
                });

                if (res.ok) {
                    alert('Laboratory results submitted! System updated.');
                    currentCaseId = null;
                    document.getElementById('fulfillmentForm').style.display = 'none';
                    document.querySelector('.empty-state').style.display = 'block';
                    fetchQueue();
                }
            } catch (e) { alert('Submission failed. Check console.'); }
        }

        fetchQueue();
        setInterval(fetchQueue, 5000);
    </script>
</body>
</html>
