<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jana AI | Laboratory Fulfillment</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --primary:   #512da8;
            --secondary: #7e57c2;
            --accent:    #00e5ff;
            --bg:        #0d0d0d;
            --sidebar:   #161616;
            --card:      #1e1e1e;
            --card2:     #252525;
            --border:    rgba(255,255,255,0.08);
            --text:      #f0f0f0;
            --muted:     #888;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 28px 22px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-header h1 {
            font-size: 22px;
            margin: 0 0 4px;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .sidebar-header p { margin: 0; font-size: 13px; color: var(--muted); }

        .case-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
        }

        .case-item {
            padding: 16px;
            background: var(--card2);
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .case-item:hover {
            background: #2d2d2d;
            border-color: var(--secondary);
            transform: translateX(4px);
        }

        .case-item.active {
            background: var(--primary);
            box-shadow: 0 4px 18px rgba(81,45,168,0.45);
        }

        .case-item h3 { margin: 0 0 6px; font-size: 16px; }
        .case-item p  { margin: 0; font-size: 13px; color: var(--muted); }
        .case-item.active p { color: rgba(255,255,255,0.75); }

        /* ── Main Workspace ── */
        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-width: 0;
        }

        .workspace-header {
            padding: 22px 36px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .workspace-header h2 { margin: 0; font-size: 18px; }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ── Welcome / Empty ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            padding: 80px 20px;
            text-align: center;
            width: 100%;
        }

        .empty-state svg { opacity: 0.2; margin-bottom: 20px; }

        /* ── Fulfillment Card ── */
        .fulfillment-card {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            border-radius: 22px;
            padding: 36px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .test-list { margin: 28px 0; }

        .test-row {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--card2);
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 12px;
        }

        .test-info { flex: 1; }
        .test-info strong { display: block; font-size: 15px; margin-bottom: 4px; }
        .test-info span   { font-size: 12px; color: var(--muted); }

        .result-input {
            flex: 2;
            background: #121212;
            border: 1px solid #3a3a3a;
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .result-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .lab-notes {
            width: 100%;
            background: #121212;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            padding: 14px;
            color: var(--text);
            min-height: 90px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
        }

        .lab-notes:focus { outline: none; border-color: var(--accent); }

        .btn-submit {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: #00c8e0;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,229,255,0.3);
        }

        .badge {
            background: rgba(0,229,255,0.12);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🔬 Lab Queue</h1>
            <p>Pending diagnostic orders</p>
        </div>
        <div id="caseList" class="case-list">
            <div class="empty-state" style="padding:40px 10px;">
                <p>Looking for orders...</p>
            </div>
        </div>
    </div>

    <div class="main-panel">
        <div class="workspace-header">
            <h2 id="viewTitle">Select an Order</h2>
            <div id="statusBadge" class="badge" style="display:none;">Pending Fulfillment</div>
        </div>

        <div class="content">
            <div id="emptyView" class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M19 3H5C3.895 3 3 3.895 3 5v14c0 1.105.895 2 2 2h14c1.105 0 2-.895 2-2V5c0-1.105-.895-2-2-2z"/>
                    <path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>
                </svg>
                <p>Choose a patient from the left to upload diagnostic results.</p>
            </div>

            <div id="fulfillmentForm" class="fulfillment-card" style="display:none;">
                <div style="margin-bottom:24px;">
                    <h3 id="patientMeta" style="margin:0; color:var(--muted); font-size:13px; text-transform:uppercase; letter-spacing:1px;">Case #---</h3>
                    <h2 id="patientName" style="margin:6px 0 0; font-size:26px;">Patient Name</h2>
                </div>

                <div id="testArea" class="test-list"></div>

                <div style="border-top:1px solid var(--border); padding-top:20px;">
                    <h3 style="margin:0 0 12px; font-size:15px; color:var(--muted);">Laboratory Notes</h3>
                    <textarea id="labNotes" class="lab-notes" placeholder="General observations or technician comments..."></textarea>
                </div>

                <button class="btn-submit" onclick="submitResults()">Fulfill &amp; Update System</button>
            </div>
        </div>
    </div>

    <script>
        function getApiBase(subpath) {
            const stored = localStorage.getItem('JANA_API_URL');
            const isLocal = window.location.protocol === 'file:' || ['localhost','127.0.0.1'].includes(window.location.hostname);
            const base = stored || (isLocal ? 'http://localhost:3005' : 'https://demo.janaai.janmitra.net');
            return `${base}/api/${subpath}`;
        }

        const API_BASE = getApiBase('lab');
        let currentCaseId = null;

        async function fetchQueue() {
            try {
                const res   = await fetch(`${API_BASE}/active-orders`);
                const cases = await res.json();
                const list  = document.getElementById('caseList');

                if (!cases.length) {
                    list.innerHTML = '<div class="empty-state" style="padding:40px 10px;"><p>No pending laboratory orders.</p></div>';
                    return;
                }

                list.innerHTML = cases.map(c => `
                    <div class="case-item ${currentCaseId === c.caseId ? 'active' : ''}" onclick="selectCase('${c.caseId}')">
                        <h3>Patient Case</h3>
                        <p>${c.tests.length} test(s) pending</p>
                        <p style="font-size:11px; margin-top:6px;">${c.tests.map(t => t.name).join(', ')}</p>
                    </div>`).join('');
            } catch (e) { console.error('Queue load failed', e); }
        }

        async function selectCase(caseId) {
            currentCaseId = caseId;
            document.getElementById('emptyView').style.display        = 'none';
            document.getElementById('fulfillmentForm').style.display  = 'block';
            document.getElementById('statusBadge').style.display      = 'block';

            try {
                const res  = await fetch(`${API_BASE}/case-orders/${caseId}`);
                const data = await res.json();

                document.getElementById('patientMeta').innerText = `Case #${caseId.slice(-8)}`;
                document.getElementById('patientName').innerText = data.memberName || 'Scheduled Patient';

                document.getElementById('testArea').innerHTML = data.tests.map(t => `
                    <div class="test-row">
                        <div class="test-info">
                            <strong>${t.name}</strong>
                            <span>Status: ${t.status}</span>
                        </div>
                        <input type="text" class="result-input" data-id="${t.id}" placeholder="Enter result summary...">
                    </div>`).join('');

                document.getElementById('labNotes').value = '';
                document.getElementById('viewTitle').innerText = `Case #${caseId.slice(-6)}`;
                fetchQueue();
            } catch (e) { console.error('Load failed', e); }
        }

        async function submitResults() {
            const inputs = Array.from(document.querySelectorAll('.result-input'));
            const results = inputs.map(i => ({ id: i.dataset.id, result: i.value }));

            if (results.some(r => !r.result.trim())) {
                alert('Please enter results for all tests before submitting.');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/submit-results`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        caseId:  currentCaseId,
                        results: results,
                        notes:   document.getElementById('labNotes').value
                    })
                });

                if (res.ok) {
                    alert('✅ Laboratory results submitted! System updated.');
                    currentCaseId = null;
                    document.getElementById('fulfillmentForm').style.display = 'none';
                    document.getElementById('emptyView').style.display       = 'flex';
                    document.getElementById('statusBadge').style.display     = 'none';
                    document.getElementById('viewTitle').innerText           = 'Select an Order';
                    fetchQueue();
                } else {
                    const err = await res.json().catch(() => ({}));
                    alert('Submission failed: ' + (err.message || res.status));
                }
            } catch (e) { console.error('Submit failed', e); alert('Network error. Check console.'); }
        }

        fetchQueue();
        setInterval(fetchQueue, 5000);
    </script>
</body>
</html>
