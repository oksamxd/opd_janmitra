services:
  - type: web
    name: opd-janmitra-api
    runtime: node
    plan: starter # Starter tier is suitable for NestJS + PostgreSQL
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma db push && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opd-janmitra-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # Securely input in Render dashboard
      - key: PORT
        value: 3005

databases:
  - name: opd-janmitra-db
    plan: starter # Standard managed database
